{% extends 'SProvider/Header.html' %}
{% block researchblock %}

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top,#0a1a2f,#020b17);
color:white;
}

/* GRID BACKGROUND */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* MAIN CARD */

.main-card{
width:900px;
margin:auto;
margin-top:60px;
padding:40px;
border-radius:20px;
background:rgba(10,20,40,0.85);
border:1px solid rgba(0,255,255,0.2);
box-shadow:0 0 30px rgba(0,255,255,0.15);
}

/* TITLE */

.title{
font-family:'Orbitron';
font-size:26px;
text-align:center;
color:#00eaff;
margin-bottom:30px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0b1d33;
border:1px solid rgba(0,255,255,0.3);
padding:14px;
color:#00eaff;
font-family:'Orbitron';
}

td{
background:#091828;
border:1px solid rgba(0,255,255,0.15);
padding:14px;
text-align:center;
color:white;
}

tr:hover td{
background:#0b1d33;
}

</style>


<div class="main-card">

<div class="title">
🚗 Used Car Price Type Ratio
</div>

<table>

<tr>
<th>Price Type</th>
<th>Ratio</th>
</tr>

{% for object in objs %}

<tr>
<td>{{object.names}}</td>
<td>{{object.ratio}}</td>
</tr>

{% endfor %}

</table>

</div>

{% endblock %}
