<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>

<meta charset="UTF-8">
<title>AutoVal AI - Service Provider</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top,#0a1a2f,#020b17);
color:white;
}

/* GRID BACKGROUND */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* HEADER TITLE */

.header-title{
font-family:'Orbitron';
font-size:28px;
text-align:center;
color:#00eaff;
padding:20px;
}

/* NAVBAR */

.topnav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:15px;
background:rgba(10,20,40,0.85);
border-bottom:1px solid rgba(0,255,255,0.2);
}

/* NAV LINKS */

.topnav a{
text-decoration:none;
color:white;
padding:10px 16px;
border-radius:8px;
font-size:13px;
background:#0b1d33;
border:1px solid rgba(0,255,255,0.2);
}

.topnav a:hover{
border:1px solid #00eaff;
background:#091828;
}

/* LOGOUT BUTTON */

.topnav a:last-child{
background:linear-gradient(90deg,#ff4b2b,#ff416c);
border:none;
}

.topnav a:last-child:hover{
transform:scale(1.05);
}

/* PAGE CONTENT */

.mainholder{
padding:20px;
}

</style>

</head>

<body>

<div class="header-title">
🚗 Used Car Price Prediction Dashboard
</div>

<div class="topnav">

<a href="{% url 'Train_Test_DataSets' %}">
Train & Test Datasets
</a>

<a href="{% url 'likeschart' 'bar' %}">
Accuracy Bar Chart
</a>

<a href="{% url 'charts1' 'line' %}">
Accuracy Results
</a>

<a href="{% url 'View_Prediction_Of_Used_Car_Price' %}">
View Predictions
</a>

<a href="{% url 'Find_Used_Car_Price_Type_Ratio' %}">
Price Ratio
</a>

<a href="{% url 'Download_Trained_DataSets' %}">
Download Dataset
</a>

<a href="{% url 'charts' 'line' %}">
Ratio Chart
</a>

<a href="{% url 'View_Remote_Users' %}">
Remote Users
</a>

<a href="{% url 'login' %}">
Logout
</a>

</div>


<div class="mainholder">

{% block researchblock %}
{% endblock %}

</div>

</body>

</html>
