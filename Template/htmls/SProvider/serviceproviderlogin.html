{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<title>AutoVal AI - Service Provider Login</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top,#0a1a2f,#020b17);
color:white;
}

/* GRID BACKGROUND */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* MAIN CONTAINER */

.main-container{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* GLASS CARD */

.card{
width:420px;
padding:40px;
border-radius:20px;
background:rgba(10,20,40,0.85);
border:1px solid rgba(0,255,255,0.2);
box-shadow:0 0 30px rgba(0,255,255,0.15);
text-align:center;
}

/* TITLE */

.title{
font-family:'Orbitron';
font-size:24px;
color:#00eaff;
margin-bottom:30px;
}

/* INPUT */

.form-group{
margin-bottom:18px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid rgba(0,255,255,0.2);
background:#0b1d33;
color:white;
box-sizing:border-box;
}

input:focus{
outline:none;
border:1px solid #00eaff;
box-shadow:0 0 8px #00eaff;
}

/* LOGIN BUTTON */

.login-btn{
width:100%;
padding:13px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#1e90ff,#7b2cff);
color:white;
font-size:16px;
font-family:'Orbitron';
cursor:pointer;
}

.login-btn:hover{
transform:scale(1.02);
}

/* LINK BUTTON */

.user-login{
margin-top:20px;
display:inline-block;
padding:10px 20px;
border-radius:8px;
background:#0b1d33;
border:1px solid rgba(0,255,255,0.2);
color:white;
text-decoration:none;
}

.user-login:hover{
border:1px solid #00eaff;
}

</style>

</head>

<body>

<div class="main-container">

<div class="card">

<div class="title">
🔐 Service Provider Login
</div>

<form method="POST">
{% csrf_token %}

<div class="form-group">
<input type="text" name="username" placeholder="Enter Username" required>
</div>

<div class="form-group">
<input type="password" name="password" placeholder="Enter Password" required>
</div>

<input type="submit" name="submit1" value="Login" class="login-btn">

</form>

<a href="{% url 'login' %}" class="user-login">
User Login
</a>

</div>

</div>

</body>

</html>
