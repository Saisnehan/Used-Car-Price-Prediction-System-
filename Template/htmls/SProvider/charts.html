{% extends 'SProvider/Header.html' %}
{% block researchblock %}

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top,#0a1a2f,#020b17);
color:white;
}

/* GRID BACKGROUND */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* PAGE LAYOUT */

.dashboard{
display:flex;
gap:30px;
padding:40px;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:rgba(10,20,40,0.85);
border:1px solid rgba(0,255,255,0.2);
border-radius:15px;
padding:25px;
height:fit-content;
box-shadow:0 0 20px rgba(0,255,255,0.1);
}

.sidebar h3{
font-family:'Orbitron';
font-size:18px;
color:#00eaff;
margin-bottom:20px;
}

.sidebar a{
display:block;
text-decoration:none;
padding:12px;
margin-bottom:12px;
border-radius:8px;
background:#0b1d33;
border:1px solid rgba(0,255,255,0.2);
color:white;
}

.sidebar a:hover{
border:1px solid #00eaff;
}

/* CHART CARD */

.chart-card{
flex:1;
background:rgba(10,20,40,0.85);
border:1px solid rgba(0,255,255,0.2);
border-radius:20px;
padding:30px;
box-shadow:0 0 30px rgba(0,255,255,0.1);
}

/* CHART TITLE */

.chart-title{
font-family:'Orbitron';
font-size:24px;
color:#00eaff;
margin-bottom:20px;
}

#chartContainer{
width:100%;
height:450px;
}

</style>


<script>

window.onload = function() {

var chart = new CanvasJS.Chart("chartContainer", {
animationEnabled: true,

title:{
text:"Car Data Visualization"
},

data:[{
{% if chart_type == "line" %}
type:"line",
{% elif chart_type == "pie" %}
type:"pie",
{% elif chart_type == "spline" %}
type:"spline",
{% endif %}

startAngle:240,
yValueFormatString:"##0.00\"%\"",
indexLabel:"{label} {y}",

dataPoints:[

{% for o in form %}

{ y: {{o.dcount}}, label:"{{o.names}}" },

{% endfor %}

]

}]

});

chart.render();

}

</script>


<div class="dashboard">

<div class="sidebar">

<h3>Charts</h3>

<a href="{% url 'charts' 'pie' %}">
Pie Chart
</a>

<a href="{% url 'charts' 'line' %}">
Line Chart
</a>

<a href="{% url 'charts' 'spline' %}">
Spline Chart
</a>

</div>


<div class="chart-card">

<div class="chart-title">
📊 Data Visualization
</div>

<div id="chartContainer"></div>

</div>

</div>

<script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>

{% endblock %}
