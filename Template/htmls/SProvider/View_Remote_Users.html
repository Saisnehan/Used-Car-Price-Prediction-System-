{% extends 'SProvider/Header.html' %}
{% block researchblock %}

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top,#0a1a2f,#020b17);
color:white;
}

/* GRID BACKGROUND */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* MAIN CARD */

.main-card{
width:95%;
margin:auto;
margin-top:50px;
padding:35px;
border-radius:20px;
background:rgba(10,20,40,0.85);
border:1px solid rgba(0,255,255,0.2);
box-shadow:0 0 30px rgba(0,255,255,0.15);
}

/* TITLE */

.title{
font-family:'Orbitron';
font-size:26px;
text-align:center;
color:#00eaff;
margin-bottom:30px;
}

/* TABLE WRAPPER */

.table-container{
overflow-x:auto;
}

/* TABLE STYLE */

table{
width:100%;
border-collapse:collapse;
min-width:900px;
}

th{
background:#0b1d33;
border:1px solid rgba(0,255,255,0.3);
padding:12px;
color:#00eaff;
font-family:'Orbitron';
font-size:14px;
}

td{
background:#091828;
border:1px solid rgba(0,255,255,0.15);
padding:10px;
text-align:center;
color:white;
font-size:14px;
}

tr:hover td{
background:#0b1d33;
}

</style>


<div class="main-card">

<div class="title">
👥 Remote Users
</div>

<div class="table-container">

<table>

<tr>
<th>User Name</th>
<th>Email</th>
<th>Gender</th>
<th>Address</th>
<th>Mobile No</th>
<th>Country</th>
<th>State</th>
<th>City</th>
</tr>

{% for o in objects %}

<tr>

<td>{{o.username}}</td>
<td>{{o.email}}</td>
<td>{{o.gender}}</td>
<td>{{o.address}}</td>
<td>{{o.phoneno}}</td>
<td>{{o.country}}</td>
<td>{{o.state}}</td>
<td>{{o.city}}</td>

</tr>

{% endfor %}

</table>

</div>

</div>

{% endblock %}
