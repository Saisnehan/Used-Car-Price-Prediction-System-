{% extends 'RUser/Header.html' %}
{% block userblock %}

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background: radial-gradient(circle at top,#0a1a2f,#020b17);
    color:white;
}

/* GRID BACKGROUND */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

/* MAIN CONTAINER */

.main-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:90vh;
}

/* GLASS CARD */

.card{
    width:850px;
    padding:40px;
    border-radius:20px;
    background:rgba(10,20,40,0.85);
    border:1px solid rgba(0,255,255,0.2);
    box-shadow:0 0 30px rgba(0,255,255,0.1);
}

/* TITLE */

.title{
    font-family:'Orbitron',sans-serif;
    font-size:28px;
    text-align:center;
    margin-bottom:35px;
    color:#00eaff;
}

/* PROFILE GRID */

.profile-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap:40px;
    row-gap:25px;
}

/* LABEL */

.label{
    font-size:13px;
    color:#9fb8d1;
    margin-bottom:6px;
}

/* VALUE BOX */

.value{
    padding:12px 14px;
    border-radius:8px;
    border:1px solid rgba(0,255,255,0.2);
    background:#0b1d33;
    color:white;
}

</style>


<div class="main-container">

<div class="card">

<div class="title">
👤 User Profile
</div>

<div class="profile-grid">

<div>
<div class="label">Username</div>
<div class="value">{{object.username}}</div>
</div>

<div>
<div class="label">Email</div>
<div class="value">{{object.email}}</div>
</div>

<div>
<div class="label">Mobile Number</div>
<div class="value">{{object.phoneno}}</div>
</div>

<div>
<div class="label">Gender</div>
<div class="value">{{object.gender}}</div>
</div>

<div>
<div class="label">Address</div>
<div class="value">{{object.address}}</div>
</div>

<div>
<div class="label">Country</div>
<div class="value">{{object.country}}</div>
</div>

<div>
<div class="label">State</div>
<div class="value">{{object.state}}</div>
</div>

<div>
<div class="label">City</div>
<div class="value">{{object.city}}</div>
</div>

</div>

</div>

</div>

{% endblock %}
