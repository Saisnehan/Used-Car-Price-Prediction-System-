{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<title>AutoVal AI - Register</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top,#0a1a2f,#020b17);
color:white;
}

/* GRID BACKGROUND */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* MAIN LAYOUT */

.main-container{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* CARD */

.card{
width:900px;
padding:40px;
border-radius:20px;
background:rgba(10,20,40,0.85);
border:1px solid rgba(0,255,255,0.2);
box-shadow:0 0 30px rgba(0,255,255,0.15);
}

/* TITLE */

.title{
font-family:'Orbitron';
font-size:28px;
text-align:center;
color:#00eaff;
margin-bottom:30px;
}

/* FORM GRID */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
column-gap:35px;
row-gap:25px;
}

/* FIELD */

.form-group{
display:flex;
flex-direction:column;
}

/* LABEL */

label{
font-size:13px;
color:#9fb8d1;
margin-bottom:6px;
}

/* INPUT */

input, textarea, select{
width:100%;
padding:12px 14px;
border-radius:8px;
border:1px solid rgba(0,255,255,0.2);
background:#0b1d33;
color:white;
box-sizing:border-box;
}

textarea{
resize:none;
height:45px;
}

input:focus, textarea:focus, select:focus{
outline:none;
border:1px solid #00eaff;
box-shadow:0 0 8px #00eaff;
}

/* BUTTON */

.register-btn{
margin-top:30px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#1e90ff,#7b2cff);
color:white;
font-size:16px;
font-family:'Orbitron';
cursor:pointer;
}

.register-btn:hover{
transform:scale(1.02);
}

/* STATUS */

.status{
margin-top:25px;
padding:15px;
text-align:center;
border-radius:8px;
border:1px solid #00eaff;
background:#0b1d33;
}

/* LOGIN LINKS */

.login-links{
margin-top:25px;
display:flex;
justify-content:center;
gap:20px;
}

.login-links a{
text-decoration:none;
padding:10px 20px;
border-radius:8px;
background:#0b1d33;
border:1px solid rgba(0,255,255,0.2);
color:white;
}

.login-links a:hover{
border:1px solid #00eaff;
}

</style>

</head>

<body>

<div class="main-container">

<div class="card">

<div class="title">
🚗 AutoVal AI — User Registration
</div>

<form method="POST">
{% csrf_token %}

<div class="form-grid">

<div class="form-group">
<label>Username</label>
<input type="text" name="username" placeholder="Enter Username" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" placeholder="Enter Password" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" placeholder="Enter Email" required>
</div>

<div class="form-group">
<label>Address</label>
<textarea name="address" placeholder="Enter Address"></textarea>
</div>

<div class="form-group">
<label>Gender</label>
<select name="gender">
<option>Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="number" name="phoneno" placeholder="Enter Mobile Number" required>
</div>

<div class="form-group">
<label>Country</label>
<input type="text" name="country" placeholder="Enter Country">
</div>

<div class="form-group">
<label>State</label>
<input type="text" name="state" placeholder="Enter State">
</div>

<div class="form-group">
<label>City</label>
<input type="text" name="city" placeholder="Enter City">
</div>

</div>

<input type="submit" value="Register" class="register-btn">

</form>

{% if object %}
<div class="status">
Registered Status : {{object}}
</div>
{% endif %}

<div class="login-links">

<a href="{% url 'login' %}">User Login</a>

<a href="{% url 'serviceproviderlogin' %}">
Service Provider Login
</a>

</div>

</div>

</div>

</body>

</html>
